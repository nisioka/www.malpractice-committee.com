# 追加/変更された HTML ページを実CSS付きでスクショし、PRにコメント投稿する。
# 2通りの起動:
#  - pull_request: 手動で作ったPRに対して実行。
#  - push（自動更新ブランチ）: 週次のまっさらセッションは「生成してpushするだけ」で済むよう、
#    pushを受けてPRが無ければ自動作成し、そのままプレビューを付ける（GitHub連携ツール不要）。
name: PR プレビュー（変更ページのスクショ）

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - 'claude/medical-news-auto-update-**'

permissions:
  contents: write        # pr-previews ブランチへ画像を push
  pull-requests: write   # PR 作成・コメント

concurrency:
  group: pr-preview-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（履歴全部＝diff用）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # PR由来コードにpush資格情報を残さない（公開・comment は専用tokenで実施）

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 日本語フォント導入（ランナーにJPフォントが無く豆腐化するため）
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: PR番号を解決（pushで未作成なら自動作成）
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          PRNUM_PR: ${{ github.event.number }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          if [ "$EVENT" = "pull_request" ]; then
            echo "prnum=$PRNUM_PR" >> "$GITHUB_OUTPUT"
            echo "既存PR #$PRNUM_PR"
            exit 0
          fi
          # push起動: このブランチの開いているPRを探し、無ければ作成
          NUM=$(gh pr list --repo "$REPO" --head "$BRANCH" --base master --state open \
                  --json number --jq '.[0].number // empty')
          if [ -z "$NUM" ]; then
            URL=$(gh pr create --repo "$REPO" --base master --head "$BRANCH" \
              --title "週次自動更新: 新着記事" \
              --body "AIによる週次自動更新です。追加/変更ページは下のプレビューコメントを参照してください。マージすると本番公開されます。")
            NUM=$(printf '%s' "$URL" | grep -oE '[0-9]+$')
            echo "PR新規作成 #$NUM"
          else
            echo "既存PR #$NUM"
          fi
          echo "prnum=$NUM" >> "$GITHUB_OUTPUT"

      - name: 変更ページを描画（GitHubランナーには Chrome が同梱）
        id: render
        env:
          CHROME_BIN: /usr/bin/google-chrome
          BASE_REF: ${{ github.base_ref || 'master' }}   # ${{ }}をrun内に直接埋め込まない（インジェクション対策）
        run: |
          git fetch --depth=1 origin "$BASE_REF"
          python3 _automation/pr_preview.py --base "origin/$BASE_REF" --out /tmp/previews
          count=$(ls /tmp/previews/*.png 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "描画ページ数: $count"

      - name: 画像を pr-previews ブランチへ公開
        if: steps.render.outputs.count != '0'
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          PR="${{ steps.pr.outputs.prnum }}"
          REPO="${{ github.repository }}"
          DIR="pr-${PR}"
          URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          tmp="$(mktemp -d)"
          if git clone --depth=1 --branch pr-previews "$URL" "$tmp" 2>/dev/null; then
            :
          else
            git clone --depth=1 "$URL" "$tmp"
            ( cd "$tmp"
              git checkout --orphan pr-previews
              git rm -rf . >/dev/null 2>&1 || true
              printf 'PR プレビュー画像の保管用ブランチ（自動生成・削除可）\n' > README.md )
          fi
          ( cd "$tmp"
            rm -rf "$DIR"; mkdir -p "$DIR"
            cp /tmp/previews/*.png /tmp/previews/manifest.tsv "$DIR"/
            git config user.name  "pr-preview-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "preview: PR #${PR}" || echo "変更なし"
            # 別PRのジョブが同時に pr-previews を更新した場合に備え rebase して再試行
            pushed=0
            for attempt in 1 2 3 4 5; do
              if git push origin pr-previews; then pushed=1; break; fi
              echo "push競合、rebaseして再試行 ($attempt)"
              git fetch origin pr-previews && git rebase origin/pr-previews || git rebase --abort
              sleep $((attempt * 3))
            done
            if [ "$pushed" = "1" ]; then
              echo "rawbase=https://raw.githubusercontent.com/${REPO}/$(git rev-parse HEAD)/${DIR}" >> "$GITHUB_OUTPUT"
            else
              echo "push失敗: 5回再試行しても成功しませんでした（壊れた画像リンクを投稿しない）" >&2
              exit 1
            fi )

      - name: PR に sticky コメント投稿/更新
        if: success() && steps.pr.outputs.prnum != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.prnum }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          python3 _automation/pr_preview_comment.py \
            /tmp/previews/manifest.tsv "${{ steps.publish.outputs.rawbase }}" > /tmp/body.md
          MARKER='<!-- pr-preview-bot -->'
          CID=$(gh api "repos/${REPO}/issues/${PR}/comments" \
                  --paginate --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${CID}" -F body=@/tmp/body.md >/dev/null
            echo "コメント更新: $CID"
          else
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" -F body=@/tmp/body.md >/dev/null
            echo "コメント新規投稿"
          fi
